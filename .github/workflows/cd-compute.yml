              (github.event_name == 'pull_request' && github.base_ref == 'preprod') && secrets.PREPROD_SPRING_FLYWAY_OUTOFORDER ||
              (github.ref == 'refs/heads/prod') && secrets.PROD_SPRING_FLYWAY_OUTOFORDER ||
              (github.ref == 'refs/heads/preprod') && secrets.PREPROD_SPRING_FLYWAY_OUTOFORDER
