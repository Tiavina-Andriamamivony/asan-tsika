name: CD Compute

on:
  push:
    branches:
      - "preprod"
      - "prod"

  workflow_dispatch:
    inputs:
      env_conf_id:
        required: false
        description: |
          Env conf id.
          Optional, if set then Deployment id must remain unset (as we will create a new Deployment id). If not set, then will retrieve latest conf.
      deployment_id:
        required: false
        description: |
          Deployment id.
          Optional, if set then Env conf id must remain unset (as we already have an associated Env conf id).
          Mainly used by Poja API: regular users does not have to use it under normal conditions.
jobs:
  initiate-deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    env:
      AWS_REGION: eu-west-3
      SPRING_DATASOURCE_URL: ${{
              (github.event_name == 'pull_request' && github.base_ref == 'prod') && secrets.PROD_SPRING_DATASOURCE_URL ||
              (github.event_name == 'pull_request' && github.base_ref == 'preprod') && secrets.PREPROD_SPRING_DATASOURCE_URL ||
              (github.ref == 'refs/heads/prod') && secrets.PROD_SPRING_DATASOURCE_URL ||
              (github.ref == 'refs/heads/preprod') && secrets.PREPROD_SPRING_DATASOURCE_URL
              }}
      SPRING_DATASOURCE_USERNAME: ${{
              (github.event_name == 'pull_request' && github.base_ref == 'prod') && secrets.PROD_SPRING_DATASOURCE_USERNAME ||
              (github.event_name == 'pull_request' && github.base_ref == 'preprod') && secrets.PREPROD_SPRING_DATASOURCE_USERNAME ||
              (github.ref == 'refs/heads/prod') && secrets.PROD_SPRING_DATASOURCE_USERNAME ||
              (github.ref == 'refs/heads/preprod') && secrets.PREPROD_SPRING_DATASOURCE_USERNAME
              }}
      SPRING_DATASOURCE_PASSWORD: ${{
              (github.event_name == 'pull_request' && github.base_ref == 'prod') && secrets.PROD_SPRING_DATASOURCE_PASSWORD ||
              (github.event_name == 'pull_request' && github.base_ref == 'preprod') && secrets.PREPROD_SPRING_DATASOURCE_PASSWORD ||
              (github.ref == 'refs/heads/prod') && secrets.PROD_SPRING_DATASOURCE_PASSWORD ||
              (github.ref == 'refs/heads/preprod') && secrets.PREPROD_SPRING_DATASOURCE_PASSWORD
