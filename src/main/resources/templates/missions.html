<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Asa - Missions by Products</title>
    <link href="/main.css" rel="stylesheet"/>
</head>

<body>
<div th:replace="fragments/header :: header"></div>

<div>
    <h2 th:text="'Missions by Products'"></h2>
    <ul>
        <li th:each="p: ${products}">
            <strong th:text="${p.code()} + ': ' + ${p.name()} + ' (' + ${p.executedDays()} + ')'"
                    th:title="${p.description()}">
            </strong>
            <ul>
                <li th:each="m: ${p.missions()}"
                    th:text="${m.getCode()} + ': ' + ${m.getTitle()} + ' (' + ${m.executedDays()}  + ')'"
                    th:title="${m.getDescription()}">
                </li>
            </ul>
        </li>
    </ul>
</div>

</body>
</html>
