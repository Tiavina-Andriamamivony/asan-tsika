<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice Generator</title>
    <link href="/main.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body class="m-0 h-screen flex flex-col">

<div th:replace="fragments/header :: header"></div>

<div class="flex flex-1 overflow-hidden">
    <!-- Left section -->
    <div class="w-1/2 p-5 bg-gray-100 box-border h-full overflow-y-auto">
    <h1 class="text-4xl font-bold text-[#3F2F6A] mt-10 mb-10">Generate your monthly invoice</h1>

        <div class="flex space-x-6 mb-6">
            <div class="w-1/3">
                <label for="ref" class="block text-gray-700 font-semibold mb-1 text-sm">Date de réference :</label>
                <div class="relative">
                    <input
                            type="text"
                            id="ref"
                            name="date"
                            placeholder="Select a date"
                            th:value="${dateReference}"
                            class="w-full px-2 py-1 text-sm pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400"
                    />
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-500">
                <i class="material-icons">event</i>
            </span>
                </div>
            </div>

            <div class="w-1/3">
                <form method="get" action="/invoice/download" id="invoiceDownload">
                    <input type="hidden" name="reference" id="down_ref">

                    <button type="submit"
                            onclick="downloadInvoiceData()"
                            class="bg-[#3F2F6A] text-white mt-4 font-bold py-2 px-6 rounded hover:bg-blue-800 transition">
                        Download
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Right section -->
    <div class="w-1/2 h-full overflow-auto">
        <div id="pdf-viewer" class="w-full h-full"></div>
    </div>
</div>

<script>
    function getFormData() {
        return {
            reference: document.getElementById('ref').value,
        };
    }

    function downloadInvoiceData() {
        const formData = getFormData();

        document.getElementById("down_ref").value = formData.reference;

        document.getElementById("invoiceDownload").submit();
    }

    function loadPreview() {
        const formData = getFormData();
        const params = new URLSearchParams({
            reference: formData.reference
        });

        const url = `/invoice/preview?${params.toString()}`;

        const viewer = document.getElementById('pdf-viewer');
        viewer.innerHTML = '';

        const loadingTask = pdfjsLib.getDocument(url);
        loadingTask.promise.then(function (pdf) {
            pdf.getPage(1).then(function (page) {
                const scale = 1.2;
                const viewport = page.getViewport({ scale });

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                viewer.appendChild(canvas);

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                page.render(renderContext);
            });
        });
    }

    document.addEventListener("DOMContentLoaded", function () {
        flatpickr("#ref", {
            dateFormat: "d/m/Y",
            onChange: function () {
                loadPreview();
            }
        });

        loadPreview();
    });

</script>

</body>
</html>
