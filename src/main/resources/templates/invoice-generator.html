<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Invoice Generator</title>
    <link href="/main.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1"
      type="module"
    ></script>
  </head>
  <body class="m-0 h-screen flex flex-col">
    <div th:replace="fragments/header :: header"></div>

    <div class="flex flex-1 overflow-hidden">
      <!-- Left section -->
      <div class="w-1/2 p-5 bg-gray-100 box-border h-full overflow-y-auto">
        <h1 class="text-4xl font-bold text-[#3F2F6A] mt-10 mb-10">
          Get your invoice
        </h1>

        <div class="flex space-x-6 mb-6">
          <div class="w-1/3 flex" th:if="${yearMonthReference == null}">
            <div class="relative">
              <div class="flex items-center gap-4">
                <el-dropdown class="inline-block">
                  <button
                    class="inline-flex w-full justify-center gap-x-1.5 rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-xs inset-ring-1 inset-ring-gray-300 hover:bg-gray-50"
                  >
                    Select the month of the invoice
                    <svg
                      viewBox="0 0 20 20"
                      fill="currentColor"
                      data-slot="icon"
                      aria-hidden="true"
                      class="-mr-1 size-5 text-gray-400"
                    >
                      <path
                        d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"
                        clip-rule="evenodd"
                        fill-rule="evenodd"
                      />
                    </svg>
                  </button>

                  <el-menu
                    anchor="bottom end"
                    popover
                    class="w-72 h-64 overflow-scroll origin-top-right rounded-md bg-white shadow-lg outline-1 outline-black/5 transition transition-discrete [--anchor-gap:--spacing(2)] data-closed:scale-95 data-closed:transform data-closed:opacity-0 data-enter:duration-100 data-enter:ease-out data-leave:duration-75 data-leave:ease-in"
                  >
                    <div
                      class="py-1"
                      th:each=" monthInvoiceStatus: ${monthInvoiceStatuses}"
                    >
                      <div
                        class="flex-row flex items-center justify-between px-4 py-2 text-sm text-gray-700 w-full focus:text-gray-900 focus:outline-hidden"
                      >
                        <p
                          th:text="${monthInvoiceStatus.yearMonth().getMonth()}"
                        ></p>
                        <button
                          th:if="${monthInvoiceStatus.hasInvoice()}"
                          class="rounded bg-[#3f2f6a] px-6 py-2 font-semibold text-white hover:bg-blue-800"
                          th:text="Download"
                          th:attr="onclick=|downloadInvoice('${monthInvoiceStatus.yearMonth().toString()}')|"
                        ></button>
                        <button
                          th:unless="${monthInvoiceStatus.hasInvoice()}"
                          class="rounded bg-[#3f2f6a] px-6 py-2 font-semibold text-white hover:bg-blue-800"
                          th:text="Generate"
                          th:attr="onclick=|getPreviewFor('${monthInvoiceStatus.yearMonth().toString()}')|"
                        ></button>
                      </div>
                    </div>
                  </el-menu>
                </el-dropdown>
                <!-- The "download" form  -->
                <form
                  method="get"
                  action="/download-invoice"
                  id="invoiceDownload"
                >
                  <input type="hidden" name="yearMonth" id="down_ref" />
                </form>
              </div>
            </div>
          </div>
        </div>

        <input
          type="yearMonth"
          id="ref"
          name="date"
          placeholder="Select a date"
          hidden
          th:value="${yearMonthReference}"
          class="w-full px-2 py-1 text-sm pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400"
        />

        <div
          th:unless="${yearMonthReference == null}"
          class="flex flex-col items-start justify-between text-center focus:outline-none bg-gray-200 py-8 px-8 rounded-lg"
        >
          <div class="sm:flex sm:items-start">
            <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
              <h2 id="dialog-title" class="text-4xl font-bold text-[#e7050f]">
                Warning
              </h2>
              <div class="mt-2">
                <p class="text-sm font-semibold text-gray-500">
                  Remember, you can only generate the invoice once.
                </p>
                <p class="text-sm text-gray-500">
                  Make sure you have reported all your days worked for the
                  corresponding month.
                </p>
              </div>
            </div>
          </div>
          <form
            method="get"
            action="/invoice/generate"
            id="invoiceGenerate"
            class="py-3 flex justify-start items-center gap-8 w-full"
          >
            <button
              onclick="generateInvoice()"
              command="close"
              commandfor="dialog"
              class="inline-flex w-full justify-center rounded-md bg-[#e7050f] px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-[#a0151f] sm:ml-3 sm:w-auto"
            >
              Confirm Generation
            </button>
            <a
              href="/invoice"
              type="button"
              command="close"
              commandfor="dialog"
              class="mt-3 inline-flex w-full justify-center rounded-md bg-gray-300 px-3 py-2 text-sm font-semibold shadow-xs inset-ring inset-ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto"
            >
              Cancel
            </a>
            <input type="hidden" name="yearMonth" id="gen_ref" />
          </form>
        </div>
      </div>

      <!-- Right section -->
      <div
        class="w-1/2 h-full overflow-auto"
        th:if="${yearMonthReference != null}"
      >
        <iframe id="pdf-viewer" class="w-full h-full border-0"></iframe>
      </div>
    </div>

    <script>
      function getFormData() {
        return {
          yearMonth: document.getElementById("ref").value,
        };
      }

      function downloadInvoice(yearMonth) {
        document.getElementById("down_ref").value = yearMonth;
        document.getElementById("invoiceDownload").submit();
      }

      function generateInvoice() {
        const formData = getFormData();
        document.getElementById("gen_ref").value = formData.yearMonth;
        document.getElementById("invoiceGenerate").submit();
      }

      function loadPreview() {
        const formData = getFormData();
        const params = new URLSearchParams({
          yearMonth: formData.yearMonth,
        });

        const url = `/invoice/preview?${params.toString()}`;

        const viewer = document.getElementById("pdf-viewer");
        viewer.src = url;
      }

      // reload page when selecting a new date
      function getPreviewFor(yearMonth) {
        window.location.href = `/invoice?yearMonth=${yearMonth}`;
      }

      document.addEventListener("DOMContentLoaded", function () {
        flatpickr("#ref", {
          dateFormat: "Y-m",
        });

        loadPreview();
      });
    </script>
  </body>
</html>
