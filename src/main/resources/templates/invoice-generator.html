<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice Generator</title>
    <link href="/main.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
</head>
<body class="m-0 h-screen flex flex-col">

<div th:replace="fragments/header :: header"></div>

<div class="flex flex-1 overflow-hidden">
    <!-- Left section -->
    <div class="w-1/2 p-5 bg-gray-100 box-border h-full overflow-y-auto">
    <h1 class="text-4xl font-bold text-[#3F2F6A] mt-10 mb-10">Generate your monthly invoice</h1>

        <div class="flex space-x-6 mb-6">
            <div class="w-1/3">
                <label for="ref" class="block text-gray-700 font-semibold mb-1 text-sm">Date de réference :</label>
                <div class="relative">
                    <input
                            type="month"
                            id="ref"
                            name="date"
                            placeholder="Select a date"
                            th:value="${yearMonthReference}"
                            class="w-full px-2 py-1 text-sm pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400"
                    />
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-500">
                        <i class="material-icons">event</i>
                    </span>
                </div>
            </div>
            <!-- Modal -->
            <el-dialog>
                <dialog id="dialog" aria-labelledby="dialog-title" class="fixed inset-0 size-auto max-h-none max-w-none overflow-y-auto bg-transparent backdrop:bg-transparent">
                    <el-dialog-backdrop class="fixed inset-0 bg-gray-500/75 transition-opacity data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in"></el-dialog-backdrop>

                    <div tabindex="0" class="flex min-h-full items-end justify-center p-4 text-center focus:outline-none sm:items-center sm:p-0">
                        <el-dialog-panel class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all data-closed:translate-y-4 data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in sm:my-8 sm:w-full sm:max-w-lg data-closed:sm:translate-y-0 data-closed:sm:scale-95">
                            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                                <div class="sm:flex sm:items-start">
                                    <div class="mx-auto flex size-12 shrink-0 items-center justify-center rounded-full bg-red-100 sm:mx-0 sm:size-10">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="size-6 text-red-600">
                                            <path d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" stroke-linecap="round" stroke-linejoin="round" />
                                        </svg>
                                    </div>
                                    <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
                                        <h3 id="dialog-title" class="text-base font-semibold text-gray-900">Warning</h3>
                                        <div class="mt-2">
                                            <p class="text-sm text-gray-500">Please note that you can only generate the invoice once.</p>
                                            <p class="text-sm text-gray-500">Make sure you have reported all your days worked for the corresponding month.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
                                <form method="get" action="/invoice/generate" id="invoiceGenerate">
                                    <input type="hidden" name="yearMonth" id="gen_ref">
                                    <button type="submit" onclick="generateInvoice()" command="close" commandfor="dialog" class="inline-flex w-full justify-center rounded-md bg-[#3f2f6a] px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-blue-800 sm:ml-3 sm:w-auto">Generate</button>
                                    <button type="button" command="close" commandfor="dialog" class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-xs inset-ring inset-ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto">Cancel</button>
                                </form>
                            </div>
                        </el-dialog-panel>
                    </div>
                </dialog>
            </el-dialog>

            <div class="w-1/3">
                <div th:if="${invoiceDetails.isEmpty()}">
                        <button command="show-modal"
                                commandfor="dialog"
                                class="rounded bg-[#3f2f6a] px-6 py-2 font-semibold text-white hover:bg-blue-800"
                        >
                            Generate
                        </button>
                        <button type="submit"
                                class="bg-[#D9D9D9] mt-4 font-bold py-2 px-6 rounded transition"
                                disabled
                        >
                            Download
                        </button>
                </div>
                <div th:if="${!invoiceDetails.isEmpty()}">
                    <input type="hidden" id="bucketKey" th:value="${invoiceDetails.get().reference()}">
                    <form method="get" action="/download-invoice" id="invoiceDownload">
                        <input type="hidden" name="invoiceBucketKey" id="down_ref">
                        <button disabled
                                class="bg-[#D9D9D9] text-white mt-4 font-bold py-2 px-6 rounded transition"
                        >
                            Generate
                        </button>
                        <button type="submit"
                                class="bg-[#3f2f6a] text-white mt-4 font-bold py-2 px-6 rounded hover:bg-blue-800 transition"
                                onclick="downloadInvoice()"
                        >
                            Download
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Right section -->
    <div class="w-1/2 h-full overflow-auto">
        <iframe id="pdf-viewer" class="w-full h-full border-0"></iframe>
    </div>
</div>

<script>
    function getFormData() {
        return {
            yearMonth: document.getElementById('ref').value,
        };
    }
     function getBucketKey(){
          return {
            invoiceBucketKey: document.getElementById('bucketKey').value,
        };
     }

    function generateInvoice(){
        const formData = getFormData();
        document.getElementById("gen_ref").value = formData.yearMonth;
        document.getElementById("invoiceGenerate").submit();
    }

    function downloadInvoice() {
        const formData = getBucketKey();
        document.getElementById("down_ref").value = formData.invoiceBucketKey;
        document.getElementById("invoiceDownload").submit();
    }

    function loadPreview() {
        const formData = getFormData();
        const params = new URLSearchParams({
            yearMonth: formData.yearMonth
        });

        const url = `/invoice/preview?${params.toString()}`;

        const viewer = document.getElementById('pdf-viewer');
        viewer.src = url;
    }

    document.addEventListener("DOMContentLoaded", function () {
        flatpickr("#ref", {
            dateFormat: "Y-m",
            onChange: function () {
            var yearMonth = getFormData().yearMonth;
             window.location.href = `/invoice?yearMonth=${yearMonth}`;
            }
        });

        loadPreview();
    });
</script>

</body>
</html>
