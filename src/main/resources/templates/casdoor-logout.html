<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Déconnexion Casdoor</title>
    <meta charset="UTF-8">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .centered {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
            text-align: center;
        }

        .spinner {
            margin-top: 20px;
            width: 40px;
            height: 40px;
            border: 4px solid #ccc;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const idTokenHint = urlParams.get("id_token_hint");
            const postLogoutRedirectUri = urlParams.get("post_logout_redirect_uri");
            const logoutUri = urlParams.get("logout_uri");
            const state = crypto.randomUUID();

            const form = document.createElement("form");
            form.method = "POST";
            form.action = logoutUri;

            const fields = {
                id_token_hint: idTokenHint,
                post_logout_redirect_uri: postLogoutRedirectUri,
                state: state
            };

            for (const key in fields) {
                const input = document.createElement("input");
                input.type = "hidden";
                input.name = key;
                input.value = fields[key];
                form.appendChild(input);
            }

            document.body.appendChild(form);
            form.submit();
        };
    </script>
</head>
<body>
<div class="centered">
    <p>Déconnexion en cours depuis Casdoor…</p>
    <div class="spinner"></div>
</div>
</body>
</html>
