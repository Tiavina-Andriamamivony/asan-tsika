<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Work & Care Calendar</title>
    <link href="/main.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>

<body>
<div th:replace="fragments/header :: header"></div>

<div class="flex justify-between gap-6 py-6 bg-gray-50">
    <!-- Left section: Main title and Worker Selector -->
    <div class="px-6">
        <h1 th:text="${thYear.year()} + ' - ' + ${thYear.title()}"
            class="text-2xl font-semibold">
        </h1>
        <div class="pt-5">
            <div th:replace="fragments/workerSelector :: workerSelector(work-and-care-calendar, Myself)"></div>
        </div>
    </div>
    <!-- Right section: Color Description -->
    <div class="px-6">
        <h2 class="text-2xl font-semibold">Color description</h2>
        <ul class="mt-2">
            <li th:each="description : ${thYear.colorDescriptions()}" class="flex items-center gap-2">
                <div class="w-6 h-3 rounded"
                     th:style="'background-color: ' + ${thYear.hexColor(description.getKey())}">
                </div>
                <span class="text-gray-800" th:text="${description.getValue()}"></span>
            </li>
        </ul>
    </div>
</div>

<div class="calendar bg-gray-50 py-6">
    <div th:each="month : ${thYear.months()}" class="month grid gap-4 px-6">
        <h2 th:text="${month.yearMonth().month}" class="text-center text-3xl font-semibold text-gray-800 mb-4"></h2>

        <table class="w-full bg-white rounded-lg shadow-md">
            <thead>
            <tr class="bg-gray-200 text-gray-800">
                <th class="text-lg">Week</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
                <th>Sat</th>
                <th>Sun</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="week : ${month.weeks()}">
                <td th:text="${week}" class="border p-3 text-center text-gray-700 font-semibold"></td>

                <td th:each="day : ${month.daysByWeek(week)}"
                    th:text="${month.isFillerDay(day) ? '' : day}"
                    th:style="'background-color: ' + ${thYear.hexColor(month, day)} + ';'"
                    class="day-cell p-3 text-center border hover:bg-teal-200 transition-colors duration-200">
                </td>
            </tr>
            </tbody>
        </table>

        <div style="margin-top: 10px;">
            Work Days: <span th:text="${#numbers.formatDecimal(month.workDays, 1, 1)}"></span><br>
            Paid Care Days: <span th:text="${#numbers.formatDecimal(month.paidCareDays, 1, 1)}"></span><br>
            Unpaid Care Days: <span th:text="${#numbers.formatDecimal(month.unpaidCareDays, 1, 1)}"></span><br>
        </div>
    </div>
</div>

<script>
    function updateFilters() {
        const workerCode = document.getElementById("worker").value;
        window.location.href = `/work-and-care-calendar?workerCode=${workerCode}`;
    }

    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById("worker").addEventListener("change", updateFilters);
    });
</script>
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
