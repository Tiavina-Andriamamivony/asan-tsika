<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Work & Care Calendar</title>
    <link href="/main.css" rel="stylesheet"/>
</head>

<body>
<div th:replace="fragments/header :: header"></div>

<h1 th:text="${thYear.year()} + ' - ' + ${thYear.title()}"></h1>

<div>
    <h2>Worker</h2>
    <div th:replace="fragments/workerSelector :: workerSelector(work-and-care-calendar, Myself)"></div>
</div>

<div>
    <h2>Color description</h2>
    <ul th:each="description: ${thYear.colorDescriptions()}">
        <li th:text="${description.getValue()}"
            th:style="'color: ' + ${thYear.hexColor(description.getKey())} + ';'"></li>
    </ul>
</div>

<div class="calendar">
    <div class="month" th:each="month : ${thYear.months()}">
        <h2 th:text="${month.yearMonth().month}"></h2>

        <table>
            <thead>
            <tr>
                <th>Week</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
                <th>Sat</th>
                <th>Sun</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="week: ${month.weeks()}">
                <td th:text="${week}" th:classappend="week"></td>
                <td th:each="day: ${month.daysByWeek(week)}"
                    th:text="${month.isFillerDay(day) ? '' : day}"
                    th:style="'background-color: ' + ${thYear.hexColor(month, day)} + ';'"></td>
            </tr>
            </tbody>
        </table>

        <div style="margin-top: 10px;">
            Work Days: <span th:text="${#numbers.formatDecimal(month.workDays, 1, 1)}"></span><br>
            Paid Care Days: <span th:text="${#numbers.formatDecimal(month.paidCareDays, 1, 1)}"></span><br>
            Unpaid Care Days: <span th:text="${#numbers.formatDecimal(month.unpaidCareDays, 1, 1)}"></span><br>
        </div>
    </div>
</div>

<script>
    function updateFilters() {
        const workerCode = document.getElementById("worker").value;
        window.location.href = `/work-and-care-calendar?workerCode=${workerCode}`;
    }

    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById("worker").addEventListener("change", updateFilters);
    });
</script>

</body>
</html>
